# yaml-language-server: $schema=<https://canary.uniform.app/schemas/json-schema/component-definition/v1.json>
$schema: https://canary.uniform.app/schemas/json-schema/component-definition/v1.json
id: hotspot
name: Hotspot
icon: edit-black-point
parameters:
  - id: icon
    name: Icon
    type: asset
    helpText: ''
    typeConfig:
      max: 1
      min: 1
      required: true
    localizable: false
  - id: iconHorizontalPosition
    name: Horizontal Position
    type: tp-slider-parameter
    helpText: ''
    typeConfig:
      step: 0.5
      type: steps
      unit: px
      units: '%'
      options: []
      maxValue: 100
      minValue: 0
    localizable: false
  - id: iconVerticalPosition
    name: Vertical Position
    type: tp-slider-parameter
    helpText: ''
    typeConfig:
      step: 0.5
      type: steps
      unit: px
      units: '%'
      options: []
      maxValue: 100
      minValue: 0
    localizable: false
  - id: d68fb05b-6155-4d8a-8934-f20e5eac934e
    name: 'Tooltip Settings '
    type: group
    typeConfig:
      collapsed: false
      childrenParams:
        - tooltipPosition
        - tooltipWidth
        - tooltipBackgroundColor
        - backgroundColor
        - withTooltipShadow
  - id: tooltipPosition
    name: Position
    type: tp-slider-parameter
    helpText: ''
    typeConfig:
      step: 1
      type: custom
      unit: px
      options:
        - label: Top
          value: top
        - label: Top Right
          value: top-right
        - label: Right Top
          value: right-top
        - label: Right
          value: right
        - label: Right Bottom
          value: right-bottom
        - label: Bottom Right
          value: bottom-right
        - label: Bottom
          value: bottom
        - label: Bottom Left
          value: bottom-left
        - label: Left Bottom
          value: left-bottom
        - label: Left
          value: left
        - label: Left Top
          value: left-top
        - label: Top Left
          value: top-left
        - label: Center
          value: center
      maxValue: 10
      minValue: 0
    localizable: false
  - id: tooltipWidth
    name: Width
    type: tp-slider-parameter
    helpText: ''
    typeConfig:
      step: 10
      type: steps
      unit: px
      options: []
      maxValue: 1000
      minValue: 0
    localizable: false
  - id: tooltipBackgroundColor
    name: Background Color
    type: tp-color-palette-parameter
    helpText: ''
    typeConfig:
      allowThemeColors:
        - primary
        - secondary-content
        - info-content
        - base-200
        - secondary
    localizable: false
  - id: withTooltipShadow
    name: Shadow
    type: checkbox
    helpText: ''
    typeConfig: null
    localizable: false
categoryId: 94a7a423-8c09-4264-8495-c562c17d811e
useTeamPermissions: true
slots:
  - id: content
    name: Content
    allowedComponents: []
    allowAllComponents: true
    inheritAllowedComponents: false
    patternsInAllowedComponents: false
thumbnailParameter: icon
canBeComposition: false
